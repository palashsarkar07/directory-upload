<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Directory Upload</title>
  </head>
  <body>
    <h2>Directory Upload</h2>

    <label>
      Project ID:
      <input type="text" id="projectId" placeholder="Project UUID" />
    </label>

    <br />
    <br />

    <label>
      User ID:
      <input type="text" id="userId" placeholder="User UUID" />
    </label>

    <br />
    <br />

    <label>
      Bearer Token:
      <input
        type="text"
        id="token"
        placeholder="JWT Token"
        style="width: 500px"
      />
    </label>

    <br />
    <br />

    <input type="file" id="folderInput" webkitdirectory multiple />

    <br />
    <br />

    <button id="uploadBtn">Upload Directory</button>

    <br />
    <br />

    <pre id="status"></pre>

    <script src="/config.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
